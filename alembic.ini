# alembic.ini — Configuration Alembic pour le projet PM MTN CI
# L'URL de connexion est surchargée par alembic/env.py (variable DATABASE_URL).

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
# Valeur par défaut — surchargée dans env.py depuis .env
sqlalchemy.url = postgresql://postgres:postgres@localhost:5432/pm_mtn_db

[post_write_hooks]
# hooks.runner = alembic.hooks:write_hooks

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
